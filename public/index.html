<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>λlambda Heating & Air | Multi-Location SEO Demo</title>
    <meta name="description" content="Fictional λlambda Heating & Air demo site showcasing a data-driven SEO architecture, generated location pages, and lead capture flows." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Heartland Heating & Air" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Schema Markup for Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "λlambda Heating & Air (Demo)",
      "image": "https://example.com/logo.png",
      "description": "Demo local service business showing multi-location SEO architecture and lead generation flows.",
      "telephone": "+1-317-555-0123",
      "address": {
        "@type": "PostalAddress",
      "addressLocality": "Metro City",
      "addressRegion": "MC",
      "postalCode": "00000",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 39.7684,
        "longitude": -86.1581
      },
      "openingHours": "Mo-Su 00:00-23:59",
      "priceRange": "$$",
      "serviceArea": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 39.7684,
          "longitude": -86.1581
        },
        "geoRadius": "50 miles"
      }
    }
    </script>

    <!-- Calendly widget script -->
    <script src="https://assets.calendly.com/assets/external/widget.js" async></script>
    
    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="components/Navbar.css" />
    <link rel="stylesheet" href="components/Footer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Component CSS (loaded last to avoid conflicts) -->
    <link rel="stylesheet" href="components/Hero.css" />
    <link rel="stylesheet" href="components/ServiceAreas.css" />
    <link rel="stylesheet" href="components/Services.css" />
    <link rel="stylesheet" href="components/WhyChoose.css" />
    <link rel="stylesheet" href="components/SchedulingWidget.css" />
    <link rel="stylesheet" href="components/TrustSignals.css" />
    <link rel="stylesheet" href="components/About.css" />
    <link rel="stylesheet" href="components/Reviews.css" />
    <link rel="stylesheet" href="components/Contact.css" />
    <link rel="stylesheet" href="components/FloatingButtons.css" />
  </head>
  <body>
    <!-- Navbar Component Container -->
    <div id="navbar-component-container"></div>

    <!-- Hero Component -->
    <section class="section">
      <div id="hero-component-container"></div>
    </section>

    <!-- Trust Signals Component -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-blue);">
      <div id="trust-signals-component-container"></div>
    </section>

    <!-- Services Component -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-red);">
      <div id="services-component-container"></div>
    </section>

    <!-- About Component -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-blue);">
      <div id="about-component-container"></div>
    </section>

    <!-- Reviews Component Container -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-red);">
      <div id="reviews-component-container"></div>
    </section>

    <!-- Why Choose Heartland Component -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-blue);">
      <div id="why-choose-component-container"></div>
    </section>

    <!-- Service Areas Component -->
    <section class="section" style="border-bottom: 3px solid var(--heartland-red);">
      <div id="service-areas-component"></div>
    </section>

    <!-- Scheduling Widget -->
    <section id="schedule" class="section bg-brand-secondary text-white" style="padding: 2rem 0;">
      <div class="container">
        <!-- Scheduling Widget Container -->
        <div id="schedule-widget"></div>
      </div>
    </section>

    <!-- Footer Component Container -->
    <footer></footer>

    <!-- Main JavaScript with ES6 Modules -->
    <script src="main.js" type="module"></script>
  </body>
</html>
